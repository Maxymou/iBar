services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-ibar}
      POSTGRES_USER: ${DB_USER:-ibar_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ibar_user} -d ${DB_NAME:-ibar}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---------------------------------------------------------------------------
  # iBar Application (Node.js backend + React frontend)
  # ---------------------------------------------------------------------------
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - NODE_ENV=production
    volumes:
      - uploads:/app/backend/uploads
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Adminer (Database admin interface)
  # ---------------------------------------------------------------------------
  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-9000}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha-dark
    depends_on:
      - postgres

volumes:
  pgdata:
  uploads:
